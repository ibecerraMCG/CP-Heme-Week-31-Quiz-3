<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Week 31 Wednesday & Thursday Practice Quiz</title>
    <style>
        /* --- CSS Variables & Themes --- */
        :root {
            /* Base Transition */
            --transition-speed: 0.3s;
            --font-main: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        /* 1. Modern Dark (Default) */
        [data-theme="dark"] {
            --bg-body: #1e293b;
            --bg-card: #334155;
            --bg-header: #0f172a;
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
            --text-accent: #38bdf8;
            --border-color: #475569;
            --highlight-bg: #475569;
            --button-bg: #38bdf8;
            --button-text: #0f172a;
            --button-hover: #0ea5e9;
            --feedback-success-bg: #064e3b;
            --feedback-success-border: #059669;
            --feedback-success-text: #a7f3d0;
            --feedback-error-bg: #7f1d1d;
            --feedback-error-border: #dc2626;
            --feedback-error-text: #fecaca;
        }

        /* 2. Modern Light */
        [data-theme="light"] {
            --bg-body: #f3f4f6;
            --bg-card: #ffffff;
            --bg-header: #ffffff;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --text-accent: #2563eb;
            --border-color: #e5e7eb;
            --highlight-bg: #f3f4f6;
            --button-bg: #2563eb;
            --button-text: #ffffff;
            --button-hover: #1d4ed8;
            --feedback-success-bg: #ecfdf5;
            --feedback-success-border: #34d399;
            --feedback-success-text: #065f46;
            --feedback-error-bg: #fef2f2;
            --feedback-error-border: #f87171;
            --feedback-error-text: #991b1b;
        }

        /* 3. Midnight (Pure Black) */
        [data-theme="midnight"] {
            --bg-body: #000000;
            --bg-card: #000000;
            --bg-header: #000000;
            --text-main: #e0e0e0;
            --text-muted: #888888;
            --text-accent: #90caf9;
            --border-color: #333333;
            --highlight-bg: #1a1a1a;
            --button-bg: #90caf9;
            --button-text: #000000;
            --button-hover: #42a5f5;
            --feedback-success-bg: #051b11;
            --feedback-success-border: #0f5132;
            --feedback-success-text: #75b798;
            --feedback-error-bg: #2c0b0e;
            --feedback-error-border: #842029;
            --feedback-error-text: #ea868f;
        }

        /* 4. Legacy Dark (Original) */
        [data-theme="legacy-dark"] {
            --bg-body: #2d343e;
            --bg-card: #3c424f;
            --bg-header: #3c424f;
            --text-main: #e8e6e3;
            --text-muted: #b0c4de;
            --text-accent: #8ab4f8;
            --border-color: #555;
            --highlight-bg: #454c5a;
            --button-bg: #8ab4f8;
            --button-text: #202124;
            --button-hover: #a3c5f9;
            --feedback-success-bg: #344e41;
            --feedback-success-border: #52b788;
            --feedback-success-text: #c7f9cc;
            --feedback-error-bg: #5e2129;
            --feedback-error-border: #a4133c;
            --feedback-error-text: #f8d7da;
        }

        /* 5. Sepia (Reading Mode) */
        [data-theme="sepia"] {
            --bg-body: #f4ecd8;
            --bg-card: #fdf6e3;
            --bg-header: #e4d5b7;
            --text-main: #433422;
            --text-muted: #7c6f5a;
            --text-accent: #a05a2c;
            --border-color: #d3c4a5;
            --highlight-bg: #ebe1c9;
            --button-bg: #a05a2c;
            --button-text: #fdf6e3;
            --button-hover: #864822;
            --feedback-success-bg: #e6f4ea;
            --feedback-success-border: #8ab893;
            --feedback-success-text: #2e4c35;
            --feedback-error-bg: #f9e3e3;
            --feedback-error-border: #d48f8f;
            --feedback-error-text: #5c2b2b;
        }

        /* 6. High Contrast */
        [data-theme="contrast"] {
            --bg-body: #000000;
            --bg-card: #000000;
            --bg-header: #000000;
            --text-main: #ffffff;
            --text-muted: #dddddd;
            --text-accent: #ffff00;
            --border-color: #ffffff;
            --highlight-bg: #333333;
            --button-bg: #ffff00;
            --button-text: #000000;
            --button-hover: #e6e600;
            --feedback-success-bg: #000000;
            --feedback-success-border: #00ff00;
            --feedback-success-text: #00ff00;
            --feedback-error-bg: #000000;
            --feedback-error-border: #ff0000;
            --feedback-error-text: #ff0000;
        }

        /* --- Global Reset & Layout --- */
        * { box-sizing: border-box; }
        
        body {
            font-family: var(--font-main);
            margin: 0;
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: background-color var(--transition-speed), color var(--transition-speed);
            line-height: 1.6;
        }

        /* --- Header --- */
        header {
            background-color: var(--bg-header);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
            /* Default to Sticky */
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
        }

        /* Class to remove sticky behavior */
        header.unpinned {
            position: relative;
            box-shadow: none;
        }

        .header-top {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
        }

        header h1 {
            font-size: 1.25rem;
            margin: 0;
            color: var(--text-accent);
        }

        .controls-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .pin-btn {
            background: none;
            border: 1px solid var(--border-color);
            color: var(--text-main);
            cursor: pointer;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 1rem;
            transition: background-color 0.2s;
        }

        .pin-btn:hover {
            background-color: var(--highlight-bg);
        }

        .pin-btn.pin-active {
            color: var(--text-accent);
            border-color: var(--text-accent);
            background-color: rgba(0, 0, 0, 0.1);
        }

        .theme-control {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
            color: var(--text-muted);
        }

        select#theme-select {
            padding: 6px 12px;
            border-radius: 6px;
            border: 1px solid var(--border-color);
            background-color: var(--bg-card);
            color: var(--text-main);
            cursor: pointer;
            font-family: inherit;
        }

        /* --- Section Navigation --- */
        .section-nav {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .section-nav button {
            background-color: var(--highlight-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .section-nav button:hover {
            border-color: var(--text-accent);
            color: var(--text-accent);
        }

        /* --- Main Content --- */
        .container {
            max-width: 850px;
            margin: 2rem auto;
            padding: 0 1rem 4rem 1rem;
        }

        .section-header {
            margin-top: 3rem;
            margin-bottom: 1.5rem;
            padding-bottom: 0.5rem;
            border-bottom: 2px solid var(--text-accent);
            color: var(--text-accent);
            font-size: 1.5rem;
            font-weight: 700;
            scroll-margin-top: 140px; /* Offset for sticky header */
        }

        /* --- Question Card --- */
        .question-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            margin-bottom: 2rem;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            transition: transform 0.2s ease;
        }

        .lo-box {
            background-color: var(--highlight-bg);
            border-left: 4px solid var(--text-accent);
            padding: 1rem;
            margin-bottom: 1.5rem;
            border-radius: 4px;
            font-size: 0.9rem;
            color: var(--text-muted);
            font-style: italic;
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
        }

        /* --- Options --- */
        .options-grid {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .option-label {
            display: flex;
            align-items: flex-start;
            padding: 1rem;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .option-label:hover {
            background-color: var(--highlight-bg);
            border-color: var(--text-muted);
        }

        .option-label input {
            margin-top: 0.3rem;
            margin-right: 1rem;
            accent-color: var(--text-accent);
            transform: scale(1.2);
        }

        /* --- Buttons --- */
        .btn-check {
            margin-top: 1.5rem;
            background-color: var(--button-bg);
            color: var(--button-text);
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 6px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
            font-size: 1rem;
        }

        .btn-check:hover {
            opacity: 0.9;
        }

        /* --- Feedback Area --- */
        .feedback {
            margin-top: 1.5rem;
            padding: 1.5rem;
            border-radius: 8px;
            display: none; /* Hidden by default */
            border: 1px solid transparent;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .feedback.correct {
            background-color: var(--feedback-success-bg);
            border-color: var(--feedback-success-border);
            color: var(--feedback-success-text);
        }

        .feedback.incorrect {
            background-color: var(--feedback-error-bg);
            border-color: var(--feedback-error-border);
            color: var(--feedback-error-text);
        }

        .feedback-header {
            font-weight: 800;
            font-size: 1.1rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .rationale {
            margin-top: 1rem;
            font-size: 0.95rem;
        }

        .source {
            display: block;
            margin-top: 1rem;
            font-size: 0.85rem;
            opacity: 0.8;
            font-style: italic;
            border-top: 1px dashed currentColor;
            padding-top: 0.5rem;
        }

        /* --- Mobile Tweaks --- */
        @media (max-width: 600px) {
            .header-top { flex-direction: column; gap: 10px; align-items: flex-start; }
            .controls-wrapper { width: 100%; justify-content: space-between; }
            .question-card { padding: 1.5rem; }
            header h1 { font-size: 1.1rem; }
            .section-nav { justify-content: center; }
        }
    </style>
</head>
<body>

    <header id="main-header">
        <div class="header-top">
            <h1>Week 31 Wednesday & Thursday Practice Quiz</h1>
            <div class="controls-wrapper">
                <!-- Pin Button -->
                <button class="pin-btn pin-active" id="pin-btn" onclick="toggleHeader()" title="Pin/Unpin Header">
                    📍
                </button>
                
                <div class="theme-control">
                    <label for="theme-select">Theme:</label>
                    <select id="theme-select" onchange="changeTheme(this.value)">
                        <option value="dark">Modern Dark</option>
                        <option value="midnight">Midnight</option>
                        <option value="light">Modern Light</option>
                        <option value="legacy-dark">Legacy Dark</option>
                        <option value="sepia">Sepia</option>
                        <option value="contrast">High Contrast</option>
                    </select>
                </div>
            </div>
        </div>
        <!-- Dynamic Navigation Bar injected via JS -->
        <div class="section-nav" id="section-nav"></div>
    </header>

    <div class="container" id="quiz-root">
        <!-- Content injected via JS -->
    </div>

    <script>
        // --- Data ---
        const quizData = [
            // --- Section 1: Pathology of Interstitial Lung Disease ---
            {
                section: "Pathology of Interstitial Lung Disease",
                maskedLO: "LO1: Describe the common features of lung diseases grouped generally as [specific disease group].",
                fullLO: "LO1: Describe the common features of lung diseases grouped generally as interstitial lung diseases.",
                question: "A 60-year-old man presents with progressive shortness of breath over the past year. Pulmonary function tests reveal a decreased forced vital capacity (FVC) and decreased total lung capacity (TLC), but a normal FEV<sub>1</sub>/FVC ratio. A surgical lung biopsy demonstrates diffuse interstitial inflammation and fibrosis. This patient's condition belongs to a heterogeneous group of disorders collectively known as interstitial lung diseases (ILDs). Which of the following is a common feature shared by the majority of diseases in this group?",
                options: {
                    A: "Acute and rapid clinical onset",
                    B: "Chronic and diffuse presentation",
                    C: "Obstructive pattern on pulmonary function tests",
                    D: "Primary involvement of the large airways",
                    E: "Reversibility with bronchodilator therapy"
                },
                correctAnswer: "B",
                rationale: "Interstitial lung diseases (also known as diffuse parenchymal lung diseases) are a heterogeneous group of disorders. Despite their differences, they share common features, including a usually diffuse and chronic presentation, interstitial pathologic changes, and a restrictive pattern on pulmonary function tests.",
                source: "Pathology of Interstitial Lung Diseases PDF, Slide 8: \"Interstitial Lung Diseases... Common features: Usually diffuse and chronic... PFTs usually show restrictive pattern\""
            },
            {
                section: "Pathology of Interstitial Lung Disease",
                maskedLO: "LO1: Describe the common features of lung diseases grouped generally as [specific disease group].",
                fullLO: "LO1: Describe the common features of lung diseases grouped generally as interstitial lung diseases.",
                question: "A 55-year-old woman is diagnosed with an interstitial lung disease (ILD). She asks her physician about the expected course of her condition over the next several years. The physician explains that ILDs represent a heterogeneous group of diseases with variable clinical behaviors. While some forms of ILD can be self-limited or reversible, others are characterized by which of the following clinical trajectories?",
                options: {
                    A: "Complete resolution with short-term antibiotic therapy",
                    B: "Progression to severe fibrosis and death",
                    C: "Progression to squamous cell carcinoma",
                    D: "Spontaneous remission after 10 years without intervention",
                    E: "Transformation into a primarily obstructive lung disease"
                },
                correctAnswer: "B",
                rationale: "ILDs exhibit highly variable clinical behaviors depending on the specific etiology and subtype. Some are self-limited or reversible, while others have a relentless course that progresses to severe fibrosis and ultimately death.",
                source: "Pathology of Interstitial Lung Diseases PDF, Slide 8: \"Variable clinical behaviors: Some progress to severe fibrosis and death; Some are self-limited or reversible\""
            },
            {
                section: "Pathology of Interstitial Lung Disease",
                maskedLO: "LO2: Compare and contrast the general features of restrictive and obstructive lung diseases.",
                fullLO: "LO2: Compare and contrast the general features of restrictive and obstructive lung diseases.",
                question: "A 62-year-old man is undergoing pulmonary function testing (PFT) for progressive exertional dyspnea. His results show a forced vital capacity (FVC) of 65% of predicted and a total lung capacity (TLC) of 60% of predicted. Which of the following PFT findings would best confirm that he has a restrictive lung disease rather than an obstructive lung disease?",
                options: {
                    A: "Decreased FEV<sub>1</sub>",
                    B: "Decreased peak expiratory flow",
                    C: "Increased residual volume",
                    D: "Normal to increased FVC",
                    E: "Normal FEV<sub>1</sub>/FVC ratio"
                },
                correctAnswer: "E",
                rationale: "In restrictive lung diseases, both the FEV<sub>1</sub> and FVC are decreased proportionally, resulting in a normal FEV<sub>1</sub>/FVC ratio. In contrast, obstructive lung diseases are characterized by a decreased FEV<sub>1</sub>/FVC ratio. Both conditions can present with a decreased FEV<sub>1</sub>.",
                source: "Pathology of Interstitial Lung Diseases PDF, Slide 19: \"Obstructive vs. Restrictive Pulmonary Diseases - Pulmonary Function Tests: Restrictive: FVC [Decreased], TLC [Decreased], FEV1 [Decreased], FEV1/FVC [Normal]\""
            },
            {
                section: "Pathology of Interstitial Lung Disease",
                maskedLO: "LO2: Compare and contrast the general features of restrictive and obstructive lung diseases.",
                fullLO: "LO2: Compare and contrast the general features of restrictive and obstructive lung diseases.",
                question: "A 68-year-old woman with long-standing idiopathic pulmonary fibrosis develops signs of right ventricular failure. Echocardiography confirms the presence of severe pulmonary hypertension. In the context of her restrictive lung disease, which of the following pathophysiologic mechanisms is the primary driver of her pulmonary hypertension?",
                options: {
                    A: "Destruction of the capillary bed leading to increased cross-sectional area",
                    B: "Hypoxia-induced pulmonary vasodilation",
                    C: "Increased pulmonary vascular bed compliance",
                    D: "Left ventricular diastolic dysfunction",
                    E: "Reduction of the pulmonary vascular bed due to fibrosis"
                },
                correctAnswer: "E",
                rationale: "Restrictive lung diseases cause \"stiff\" lungs and reduced diffusing capacity. Patients are prone to developing pulmonary hypertension due to hypoxia-induced pulmonary vasoconstriction and the physical reduction of the pulmonary vascular bed. Pushing the same blood volume per unit of time through a reduced cross-sectional area leads to hypertension.",
                source: "Pathology of Interstitial Lung Diseases PDF, Slide 18: \"Prone to develop pulmonary hypertension... Reduction of pulmonary vascular bed: Same blood volume per unit of time through reduced cross-sectional area = hypertension\""
            },
            {
                section: "Pathology of Interstitial Lung Disease",
                maskedLO: "LO3: Explain the importance of correlating clinical, radiographic, pulmonary function testing and pathologic findings when evaluating a patient with [disease].",
                fullLO: "LO3: Explain the importance of correlating clinical, radiographic, pulmonary function testing and pathologic findings when evaluating a patient with interstitial lung disease.",
                question: "A pathologist examines a surgical lung biopsy from a 50-year-old man and identifies a \"Usual Interstitial Pneumonia (UIP)\" histologic pattern. The pathologist requests the patient's clinical history, occupational exposures, and high-resolution CT (HRCT) scans before finalizing the report. Which of the following best explains why the final diagnosis requires this multidisciplinary integration?",
                options: {
                    A: "Histologic patterns alone cannot determine the extent of lung volume loss",
                    B: "HRCT is required to detect the presence of asbestos bodies within the sample",
                    C: "Pulmonary function tests are needed to confirm the presence of granulomas",
                    D: "Some histologic patterns can be seen in other lung diseases of known etiology",
                    E: "UIP is an acute pattern that frequently resolves without treatment"
                },
                correctAnswer: "D",
                rationale: "A histologic pattern (such as UIP) is not entirely specific to a single disease. For example, a UIP pattern can be seen in Idiopathic Pulmonary Fibrosis, but also in connective tissue diseases or asbestosis. Therefore, clinical and radiologic correlation is strictly required to determine if the etiology is known or idiopathic.",
                source: "Pathology of Interstitial Lung Diseases PDF, Slide 36: \"Question: Why don’t histologic patterns and the integrated diagnosis always have the same name? Answer: Some histologic patterns can be seen in other lung diseases of known etiology.\""
            },
            {
                section: "Pathology of Interstitial Lung Disease",
                maskedLO: "LO3: Explain the importance of correlating clinical, radiographic, pulmonary function testing and pathologic findings when evaluating a patient with [disease].",
                fullLO: "LO3: Explain the importance of correlating clinical, radiographic, pulmonary function testing and pathologic findings when evaluating a patient with interstitial lung disease.",
                question: "A multidisciplinary team consisting of a pulmonologist, a radiologist, and a pathologist is reviewing the case of a 58-year-old woman with progressive dyspnea. They agree that a diagnosis of an idiopathic interstitial pneumonia should only be finalized after reviewing all clinical, radiological, and pathological data together. According to the American Thoracic Society consensus statement, what is the primary historical reason for this multidisciplinary standard?",
                options: {
                    A: "A lack of an international standard had resulted in variable and confusing diagnostic criteria and terminology",
                    B: "Pathologists were historically unable to reliably identify fibroblastic foci",
                    C: "Radiologists cannot differentiate between restrictive and obstructive disease patterns",
                    D: "Surgical lung biopsies frequently yield insufficient tissue for any morphologic diagnosis",
                    E: "UIP patterns are exclusively diagnosed via clinical history"
                },
                correctAnswer: "A",
                rationale: "Because of the confusion and overlapping terminology in the past, an international consensus established that the final diagnosis must be integrated and multidisciplinary, combining pulmonology, radiology, and pathology to accurately classify idiopathic interstitial pneumonias.",
                source: "Pathology of Interstitial Lung Diseases PDF, Slide 32: \"Despite the considerable progress in the classification of the idiopathic interstitial pneumonias, the lack of an international standard has resulted in variable and confusing diagnostic criteria and terminology... i.e. The final diagnosis is an integrated, multidisciplinary diagnosis\""
            },
            {
                section: "Pathology of Interstitial Lung Disease",
                maskedLO: "LO4: Describe idiopathic pulmonary fibrosis (IPF) in regard to pathogenesis, morphologic features, and clinical manifestations.",
                fullLO: "LO4: Describe idiopathic pulmonary fibrosis (IPF) in regard to pathogenesis, morphologic features, and clinical manifestations.",
                question: "A 65-year-old male former smoker presents with progressively worsening shortness of breath. A lung biopsy shows patchy interstitial fibrosis, fibroblastic foci, and honeycomb change, leading to a diagnosis of Idiopathic Pulmonary Fibrosis (IPF). The pathogenesis of this disease involves repeated epithelial injury that leads to abnormal fibroblast proliferation. Which of the following cytokines is considered the key mediator driving this dysregulated fibrogenesis?",
                options: {
                    A: "Interferon-gamma (IFN-&gamma;)",
                    B: "Interleukin-2 (IL-2)",
                    C: "Interleukin-4 (IL-4)",
                    D: "Transforming Growth Factor-Beta 1 (TGF-&beta;1)",
                    E: "Tumor Necrosis Factor-Alpha (TNF-&alpha;)"
                },
                correctAnswer: "D",
                rationale: "The pathogenesis of IPF is driven by repeated/chronic epithelial injury, which activates macrophages and injured pneumocytes to release TGF-&beta;1. TGF-&beta;1 is highly fibrogenic, promoting the influx of fibroblasts and their deposition of collagen.",
                source: "Pathology of Interstitial Lung Diseases PDF, Slides 45 & 46: \"Pathogenesis of Idiopathic Pulmonary Fibrosis... TGF-&beta;1 (Transforming Growth Factor Beta)... Promotes collagen deposition (fibrosis) by fibroblasts and myofibroblasts\""
            },
            {
                section: "Pathology of Interstitial Lung Disease",
                maskedLO: "LO4: Describe idiopathic pulmonary fibrosis (IPF) in regard to pathogenesis, morphologic features, and clinical manifestations.",
                fullLO: "LO4: Describe idiopathic pulmonary fibrosis (IPF) in regard to pathogenesis, morphologic features, and clinical manifestations.",
                question: "A lung biopsy from a 62-year-old man reveals varying stages of interstitial disease. In some areas, there are active, inflamed fibroblastic foci, while adjacent areas show dense, acellular collagenous fibrosis and complete loss of normal alveolar architecture (\"honeycomb lung\"). This specific microscopic finding of varying stages of fibrosis within the same tissue is a key diagnostic feature of IPF known as:",
                options: {
                    A: "Caseating necrosis",
                    B: "Granulomatous inflammation",
                    C: "Hypersensitivity reaction",
                    D: "Temporal heterogeneity",
                    E: "Uniform fibrotic scarring"
                },
                correctAnswer: "D",
                rationale: "A hallmark of the Usual Interstitial Pneumonia (UIP) pattern seen in IPF is \"temporal heterogeneity,\" meaning the biopsy simultaneously shows early/active lesions (fibroblastic foci) and old/burned-out lesions (dense collagenous fibrosis).",
                source: "Pathology of Interstitial Lung Diseases PDF, Slide 53: \"Idiopathic Pulmonary Fibrosis... Temporal Heterogeneity - A diagnostic feature - Active = inflamed, fibroblastic foci; Burned Out = dense collagenous fibrosis\""
            },
            {
                section: "Pathology of Interstitial Lung Disease",
                maskedLO: "LO5: Describe the relationship between IPF and [specific pattern].",
                fullLO: "LO5: Describe the relationship between IPF and usual interstitial pneumonia (UIP).",
                question: "A 60-year-old man undergoes a surgical lung biopsy for evaluation of severe diffuse parenchymal lung disease. The pathologist notes a \"Usual Interstitial Pneumonia (UIP)\" histologic pattern. The clinical team systematically rules out connective tissue disease, drug toxicity, and environmental exposures. Given these integrated findings, which of the following is the final clinical diagnosis for this patient?",
                options: {
                    A: "Acute interstitial pneumonia",
                    B: "Cryptogenic organizing pneumonia",
                    C: "Desquamative interstitial pneumonia",
                    D: "Idiopathic pulmonary fibrosis",
                    E: "Respiratory bronchiolitis interstitial lung disease"
                },
                correctAnswer: "D",
                rationale: "Usual interstitial pneumonia (UIP) is a descriptive histopathologic pattern. When the UIP pattern is found in a patient without any identifiable cause (idiopathic), the integrated clinical-radiologic-pathologic diagnosis is Idiopathic Pulmonary Fibrosis (IPF).",
                source: "Pathology of Interstitial Lung Diseases PDF, Slide 35: \"Histopathologic Pattern: Usual interstitial pneumonia (UIP) -> Integrated Clinical-Radiologic-Pathologic Diagnosis: Idiopathic pulmonary fibrosis (IPF) / Cryptogenic fibrosing alveolitis\""
            },
            {
                section: "Pathology of Interstitial Lung Disease",
                maskedLO: "LO5: Describe the relationship between IPF and [specific pattern].",
                fullLO: "LO5: Describe the relationship between IPF and usual interstitial pneumonia (UIP).",
                question: "A 72-year-old man who worked in shipbuilding and insulation installation for 30 years presents with progressive dyspnea. His high-resolution CT and lung biopsy demonstrate a classic pattern of Usual Interstitial Pneumonia (UIP). However, microscopic examination of the tissue under high power also reveals iron-protein complexes deposited on long, rod-like structures. Due to the presence of these structures, this UIP pattern is clinically diagnosed as:",
                options: {

                rationale: "Macitentan is an endothelin receptor antagonist. A critical black-box warning for ERAs is that they are highly teratogenic and can cause serious birth defects. Patients must strictly avoid pregnancy while on this medication.",
                source: "Clinical Presentation of Pulmonary Hypertension Cases PDF, Slide 28: \"Endothelin Receptor Antagonists... The most important information about OPSUMIT (macitentan): Do not take OPSUMIT if you are pregnant or trying to get pregnant. OPSUMIT can cause serious birth defects if taken while pregnant.\""
            },
            {
                section: "Clinical Presentation of Pulmonary Hypertension Cases",
                maskedLO: "LO6: Non- pharmacological therapy.",
                fullLO: "LO6: Non- pharmacological therapy",
                question: "A 45-year-old patient newly diagnosed with severe pulmonary hypertension is attending a comprehensive clinic visit to discuss non-pharmacologic management strategies. Which of the following interventions is a recommended non-pharmacologic therapy for this patient?",
                options: {
                    A: "Daily vigorous aerobic exercise beyond symptom limits",
                    B: "Elective living at high altitude",
                    C: "Initiation of intravenous dobutamine",
                    D: "Referral for lung transplantation assessment",
                    E: "Routine therapeutic phlebotomy"
                },
                correctAnswer: "D",
                rationale: "Non-pharmacologic therapies for PH include supportive oxygen, age-appropriate vaccinations, travel advice, contraception/pregnancy advice, support groups, and transplant referral.",
                source: "Clinical Presentation of Pulmonary Hypertension Cases PDF, Slide 38: \"Non-Pharmacologic Therapies for Pulmonary Hypertension... 6. Transplant referral\""
            },
            {
                section: "Clinical Presentation of Pulmonary Hypertension Cases",
                maskedLO: "LO6: Non- pharmacological therapy.",
                fullLO: "LO6: Non- pharmacological therapy",
                question: "A patient with severe right ventricular failure secondary to pulmonary hypertension is admitted to the intensive care unit. The patient exhibits significant signs of volume overload, including ascites and severe bipedal edema. According to volume status and fluid management principles for right ventricular failure, which of the following is an appropriate intervention to reduce right ventricular filling pressures?",
                options: {
                    A: "Administration of large-volume intravenous normal saline",
                    B: "Avoidance of central venous pressure (CVP) monitoring",
                    C: "Continuous positive airway pressure (CPAP) at maximum settings",
                    D: "Implementation of diuretics or hemofiltration",
                    E: "Rapid infusion of packed red blood cells"
                },
                correctAnswer: "D",
                rationale: "In the setting of RV failure and volume overload (which shifts the septum and impairs LV filling), active fluid management is critical. Diuretics or hemofiltration (CRRT) are utilized to optimize volume status, guided by CVP/PCWP.",
                source: "Clinical Presentation of Pulmonary Hypertension Cases PDF, Slide 37: \"Volume Status and Fluid Management... Diuretics vs Hemofiltration... CRRT\""
            }
        ];

        // --- Core Logic ---
        const quizRoot = document.getElementById('quiz-root');
        const themeSelect = document.getElementById('theme-select');
        const pinBtn = document.getElementById('pin-btn');
        const mainHeader = document.getElementById('main-header');
        const sectionNav = document.getElementById('section-nav');

        function initQuiz() {
            // Render Questions
            let currentSection = "";
            let sectionIndex = 0;
            
            quizData.forEach((item, index) => {
                // Insert Section Header if needed
                if (item.section !== currentSection) {
                    currentSection = item.section;
                    
                    // Create ID for scrolling
                    const sectionId = 'sec-' + sectionIndex;
                    
                    // Add Section Header
                    const sectionHeader = document.createElement('h2');
                    sectionHeader.className = 'section-header';
                    sectionHeader.id = sectionId;
                    sectionHeader.textContent = currentSection;
                    quizRoot.appendChild(sectionHeader);

                    // Add Nav Button dynamically
                    const navBtn = document.createElement('button');
                    // Abbreviate longer titles for the buttons if desired
                    let btnText = currentSection;
                    if (btnText.includes("Pathology of Interstitial")) btnText = "Pathology of ILD";
                    if (btnText.includes("Clinical Approach to Interstitial")) btnText = "Clinical Approach to ILD";
                    if (btnText.includes("Clinical Presentation of Pulmonary Hypertension Cases")) btnText = "Clinical Presentation of PH";
                    
                    navBtn.textContent = btnText;
                    navBtn.onclick = () => {
                        document.getElementById(sectionId).scrollIntoView({ behavior: 'smooth' });
                    };
                    sectionNav.appendChild(navBtn);

                    sectionIndex++;
                }

                // Create Card
                const card = document.createElement('div');
                card.className = 'question-card';
                card.id = `q-card-${index}`;

                // Learning Objective (Masked)
                const loBox = document.createElement('div');
                loBox.className = 'lo-box';
                loBox.id = `lo-${index}`;
                loBox.innerHTML = item.maskedLO;
                card.appendChild(loBox);

                // Question Text
                const qText = document.createElement('div');
                qText.className = 'question-text';
                qText.innerHTML = `${index + 1}. ${item.question}`;
                card.appendChild(qText);

                // Options Container
                const optionsGrid = document.createElement('div');
                optionsGrid.className = 'options-grid';

                for (const [key, value] of Object.entries(item.options)) {
                    const label = document.createElement('label');
                    label.className = 'option-label';
                    
                    const input = document.createElement('input');
                    input.type = 'radio';
                    input.name = `question-${index}`;
                    input.value = key;

                    const span = document.createElement('span');
                    // Retain letters: A. Option Text
                    span.innerHTML = `${key}. ${value}`;

                    label.appendChild(input);
                    label.appendChild(span);
                    optionsGrid.appendChild(label);
                }
                card.appendChild(optionsGrid);

                // Check Button
                const btn = document.createElement('button');
                btn.className = 'btn-check';
                btn.textContent = 'Check Answer';
                btn.onclick = () => checkAnswer(index);
                card.appendChild(btn);

                // Feedback Container
                const feedback = document.createElement('div');
                feedback.className = 'feedback';
                feedback.id = `feedback-${index}`;
                card.appendChild(feedback);

                quizRoot.appendChild(card);
            });

            // Load saved theme
            const savedTheme = localStorage.getItem('quizTheme') || 'dark';
            changeTheme(savedTheme);
            themeSelect.value = savedTheme;

            // Load saved pin state
            const savedPinState = localStorage.getItem('headerPinned');
            // Default to true (pinned) if not set or if set to true
            if (savedPinState === 'false') {
                toggleHeader(false); 
            } else {
                toggleHeader(true);
            }
        }

        function checkAnswer(index) {
            const selected = document.querySelector(`input[name="question-${index}"]:checked`);
            const feedbackEl = document.getElementById(`feedback-${index}`);
            const loEl = document.getElementById(`lo-${index}`);
            const data = quizData[index];

            if (!selected) {
                alert("Please select an answer.");
                return;
            }

            // Reveal LO
            loEl.innerHTML = data.fullLO;

            // Generate Feedback HTML
            const isCorrect = selected.value === data.correctAnswer;
            
            let html = `<span class="feedback-header">${isCorrect ? "Correct!" : "Incorrect"}</span>`;
            if (!isCorrect) {
                html += `<div>The correct answer is <strong>${data.correctAnswer}</strong>.</div>`;
            }
            
            html += `<div class="rationale"><strong>Rationale:</strong> ${data.rationale}</div>`;
            html += `<div class="source"><strong>Source:</strong> ${data.source}</div>`;

            feedbackEl.innerHTML = html;
            feedbackEl.className = `feedback ${isCorrect ? 'correct' : 'incorrect'}`;
            feedbackEl.style.display = 'block';
        }

        function changeTheme(themeName) {
            document.documentElement.setAttribute('data-theme', themeName);
            localStorage.setItem('quizTheme', themeName);
        }

        function toggleHeader(forceState) {
            // Determine current state based on class presence
            const isCurrentlyPinned = !mainHeader.classList.contains('unpinned');
            
            // If forceState is provided (boolean), use it. Otherwise toggle current state.
            const newState = (typeof forceState === 'boolean') ? forceState : !isCurrentlyPinned;

            if (newState) {
                // Pin
                mainHeader.classList.remove('unpinned');
                pinBtn.classList.add('pin-active');
                localStorage.setItem('headerPinned', 'true');
            } else {
                // Unpin
                mainHeader.classList.add('unpinned');
                pinBtn.classList.remove('pin-active');
                localStorage.setItem('headerPinned', 'false');
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', initQuiz);

    </script>
</body>
